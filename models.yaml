# Конфигурация моделей для оценки
# Каждая модель содержит:
# - name: название модели на HuggingFace или для API
# - ollama_name: (опционально) тег модели в Ollama для авто-ключа <key>-ollama
# - vllm_name: id модели для vLLM (авто-ключ <key>-vllm); для локальных моделей задан явно (совпадает с name, если не указано иное)
# - hyperparameters:
#   - vllm_quant_tag: метка для папки результатов при прогоне *-vllm (квантизация реально задаётся при vllm serve, напр. --quantization awq)
#   - vllm_serve_extra_args: опционально список аргументов к автозапуску vllm serve после --port (напр. ["--gpu-memory-utilization","0.85"] или одна строка)
#
# vLLM: автозапуск подставляет локальный снапшот из HF-кэша (если есть) + --served-model-name <name>;
# для mistralai/Ministral-*: --tokenizer-mode mistral и --language-model-only (текст без vision; VLLM_MINISTRAL_LANGUAGE_MODEL_ONLY=0 отключает);
# VLLM_SERVE_LOCAL_SNAPSHOT=0 отключает локальный снапшот и снова передаёт id в Hub (нужен интернет/DNS).
# Базовый URL: VLLM_BASE_URL (http://127.0.0.1:8000). Оценка: python main.py <key> --vllm | run_all_models.py --vllm
#
# Записи *-api: внешний API, суффиксы -ollama / -vllm не генерируются (см. model_config_loader).
#
# Остальные параметры (load_func, load_module, generate_func, generate_module)
# определяются автоматически по имени модели — см. прежние комментарии в репозитории / README.

models:
  gemma-2-2b:
    name: "google/gemma-2-2b-it"
    ollama_name: "gemma2:2b-instruct-q4_K_M"
